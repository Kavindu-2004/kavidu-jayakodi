  <text x="730" y="289" font-family="'JetBrains Mono', monospace" font-size="11" fill="#818CF8">80%</text>

  <!-- Right column labels -->
  <text x="770" y="80" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#6B7280">Expert</text>
  <text x="770" y="115" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#6B7280">Expert</text>
  <text x="770" y="150" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#6B7280">Expert</text>
  <text x="770" y="185" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#6B7280">Expert</text>
  <text x="770" y="220" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#6B7280">Advanced</text>
