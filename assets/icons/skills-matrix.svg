  <text x="20" y="185" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#9CA3AF">🎨 Tailwind CSS</text>
  <text x="20" y="220" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#9CA3AF">📱 Flutter</text>
  <text x="20" y="255" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#9CA3AF">🗄️  MySQL / PG</text>
