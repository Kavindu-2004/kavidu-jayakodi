<svg width="900" height="40" viewBox="0 0 900 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#06B6D4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main divider line -->
  <line x1="0" y1="20" x2="900" y2="20" stroke="url(#divGrad)" stroke-width="1.5" filter="url(#glow)"/>
  
  <!-- Center diamond -->
  <polygon points="450,12 458,20 450,28 442,20" fill="#8B5CF6" filter="url(#glow)"/>
  <polygon points="450,15 455,20 450,25 445,20" fill="#0d1117"/>
  
  <!-- Side dots -->
  <circle cx="300" cy="20" r="2.5" fill="#6366F1" opacity="0.7"/>
  <circle cx="600" cy="20" r="2.5" fill="#06B6D4" opacity="0.7"/>
  <circle cx="150" cy="20" r="1.5" fill="#6366F1" opacity="0.4"/>
  <circle cx="750" cy="20" r="1.5" fill="#06B6D4" opacity="0.4"/>
</svg>
