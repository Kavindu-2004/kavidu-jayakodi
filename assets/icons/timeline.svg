<svg width="900" height="200" viewBox="0 0 900 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="timelineLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.2"/>
      <stop offset="30%" style="stop-color:#6366F1;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#8B5CF6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="#0d1117"/>
  <rect width="900" height="200" rx="12" fill="none" stroke="#1F2937" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-size="16" font-weight="600" fill="#F8FAFC">Development Journey</text>

  <!-- Timeline line -->
  <line x1="60" y1="100" x2="840" y2="100" stroke="url(#timelineLine)" stroke-width="2"/>
  
  <!-- Arrow -->
  <polygon points="840,96 850,100 840,104" fill="#8B5CF6" opacity="0.6"/>

  <!-- Node 1: 2020 -->
  <circle cx="120" cy="100" r="12" fill="#6366F1" filter="url(#nodeGlow)"/>
  <circle cx="120" cy="100" r="6" fill="#F8FAFC"/>
  <text x="120" y="72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#6366F1">2020</text>
  <text x="120" y="128" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#9CA3AF">🌱 Foundations</text>
  <text x="120" y="143" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" fill="#6B7280">HTML · CSS · JS</text>

  <!-- Node 2: 2021 -->
  <circle cx="300" cy="100" r="12" fill="#7C3AED" filter="url(#nodeGlow)"/>
  <circle cx="300" cy="100" r="6" fill="#F8FAFC"/>
  <text x="300" y="72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#7C3AED">2021</text>
  <text x="300" y="128" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#9CA3AF">🌐 Web Dev</text>
  <text x="300" y="143" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" fill="#6B7280">PHP · MySQL</text>

  <!-- Node 3: 2022 -->
  <circle cx="480" cy="100" r="12" fill="#8B5CF6" filter="url(#nodeGlow)"/>
  <circle cx="480" cy="100" r="6" fill="#F8FAFC"/>
  <text x="480" y="72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#8B5CF6">2022</text>
  <text x="480" y="128" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#9CA3AF">⚛️  Full Stack</text>
  <text x="480" y="143" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" fill="#6B7280">React · Node · Flutter</text>

  <!-- Node 4: 2023–24 -->
  <circle cx="660" cy="100" r="12" fill="#06B6D4" filter="url(#nodeGlow)"/>
  <circle cx="660" cy="100" r="6" fill="#F8FAFC"/>
  <text x="660" y="72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#06B6D4">2023–24</text>
  <text x="660" y="128" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#9CA3AF">🚀 Production</text>
  <text x="660" y="143" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" fill="#6B7280">Real Projects</text>

  <!-- Node 5: 2025+ (future, pulsing) -->
  <circle cx="820" cy="100" r="14" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.6"/>
  <circle cx="820" cy="100" r="10" fill="#F59E0B" opacity="0.2"/>
  <circle cx="820" cy="100" r="5" fill="#F59E0B"/>
  <text x="820" y="72" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" font-weight="700" fill="#F59E0B">2025+</text>
  <text x="820" y="128" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#9CA3AF">🤖 AI &amp; Scale</text>
  <text x="820" y="143" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="10" fill="#6B7280">Cloud · LLMs</text>
</svg>
