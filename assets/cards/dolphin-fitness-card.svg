<svg width="440" height="220" viewBox="0 0 440 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fitGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <clipPath id="roundCard">
      <rect width="440" height="220" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundCard)">
    <!-- Background -->
    <rect width="440" height="220" fill="url(#cardBg)"/>
    
    <!-- Border -->
    <rect width="440" height="220" rx="16" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
    
    <!-- Top accent bar -->
    <rect x="0" y="0" width="440" height="4" rx="0" fill="url(#fitGrad)"/>
    
    <!-- Decorative bg shape -->
    <circle cx="380" cy="40" r="80" fill="#6366F1" opacity="0.04"/>
    
    <!-- Icon circle -->
    <circle cx="52" cy="52" r="28" fill="#6366F1" opacity="0.15"/>
    <circle cx="52" cy="52" r="28" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.4"/>
    <text x="52" y="60" text-anchor="middle" font-size="24">🏋️</text>
    
    <!-- Status badge -->
    <rect x="320" y="30" width="100" height="22" rx="11" fill="#6366F1" opacity="0.15"/>
    <circle cx="335" cy="41" r="4" fill="#22C55E"/>
    <text x="378" y="45" text-anchor="middle" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#6B7280">In Dev</text>
    
    <!-- Title -->
    <text x="92" y="42" font-family="'SF Pro Display', system-ui, sans-serif" font-size="18" font-weight="700" fill="#F8FAFC">Dolphin Fitness</text>
    <text x="92" y="62" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#6B7280">Center Management System</text>
    
    <!-- Divider -->
    <line x1="24" y1="94" x2="416" y2="94" stroke="#1F2937" stroke-width="1"/>
    
    <!-- Tech tags row -->
    <rect x="24" y="108" width="54" height="20" rx="10" fill="#6366F1" opacity="0.15"/>
    <text x="51" y="122" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#818CF8">React</text>
    
    <rect x="86" y="108" width="64" height="20" rx="10" fill="#22C55E" opacity="0.1"/>
    <text x="118" y="122" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4ADE80">Node.js</text>
    
    <rect x="158" y="108" width="52" height="20" rx="10" fill="#F59E0B" opacity="0.1"/>
    <text x="184" y="122" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#FCD34D">MySQL</text>
    
    <rect x="218" y="108" width="44" height="20" rx="10" fill="#3B82F6" opacity="0.1"/>
    <text x="240" y="122" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" fill="#60A5FA">JWT</text>
    
    <!-- Feature list -->
    <text x="24" y="152" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#9CA3AF">📊 Member Analytics · 💳 Payments · 📅 Scheduling</text>
    <text x="24" y="172" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#9CA3AF">🔐 Role-Based Access · 📱 Mobile Responsive</text>
    
    <!-- Bottom bar -->
    <rect x="24" y="196" width="180" height="2" rx="1" fill="url(#fitGrad)" opacity="0.5"/>
    
    <!-- Stars mock -->
    <text x="380" y="202" text-anchor="end" font-family="'SF Pro Text', system-ui, sans-serif" font-size="12" fill="#6B7280">⭐ Full Stack Project</text>
  </g>
</svg>
