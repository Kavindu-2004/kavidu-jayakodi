<svg width="900" height="280" viewBox="0 0 900 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a5b4fc;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366F1" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bgGrad)"/>
  
  <!-- Grid overlay -->
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Decorative orbs -->
  <circle cx="100" cy="80" r="120" fill="#6366F1" opacity="0.04"/>
  <circle cx="800" cy="200" r="100" fill="#8B5CF6" opacity="0.05"/>
  <circle cx="450" cy="140" r="200" fill="#06B6D4" opacity="0.02"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#accentGrad)"/>

  <!-- Decorative circuit lines -->
  <g opacity="0.2">
    <line x1="60" y1="40" x2="120" y2="40" stroke="#6366F1" stroke-width="1"/>
    <line x1="120" y1="40" x2="120" y2="80" stroke="#6366F1" stroke-width="1"/>
    <circle cx="120" cy="80" r="3" fill="#6366F1"/>
    <line x1="780" y1="200" x2="840" y2="200" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="780" y1="200" x2="780" y2="160" stroke="#8B5CF6" stroke-width="1"/>
    <circle cx="780" cy="160" r="3" fill="#8B5CF6"/>
  </g>

  <!-- Main title -->
  <text x="450" y="110" 
        text-anchor="middle" 
        font-family="'SF Pro Display', 'Segoe UI', system-ui, sans-serif" 
        font-size="56" 
        font-weight="700" 
        fill="url(#textGrad)"
        filter="url(#softGlow)">
    Anuhas Jayakodi
  </text>

  <!-- Subtitle with accent underline -->
  <text x="450" y="148" 
        text-anchor="middle" 
        font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif" 
        font-size="18" 
        font-weight="400" 
        fill="#8B8FA8"
        letter-spacing="3">
    SOFTWARE DEVELOPER · FULL STACK ENGINEER
  </text>

  <!-- Accent underline -->
  <rect x="310" y="158" width="280" height="2" rx="1" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Bottom tags -->
  <!-- Tag: React -->
  <rect x="190" y="195" width="72" height="26" rx="13" fill="#6366F1" opacity="0.15"/>
  <rect x="190" y="195" width="72" height="26" rx="13" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.4"/>
  <text x="226" y="213" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#818CF8">React</text>

  <!-- Tag: Node.js -->
  <rect x="272" y="195" width="72" height="26" rx="13" fill="#22C55E" opacity="0.1"/>
  <rect x="272" y="195" width="72" height="26" rx="13" fill="none" stroke="#22C55E" stroke-width="1" opacity="0.4"/>
  <text x="308" y="213" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#4ADE80">Node.js</text>

  <!-- Tag: Flutter -->
  <rect x="354" y="195" width="72" height="26" rx="13" fill="#06B6D4" opacity="0.1"/>
  <rect x="354" y="195" width="72" height="26" rx="13" fill="none" stroke="#06B6D4" stroke-width="1" opacity="0.4"/>
  <text x="390" y="213" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#22D3EE">Flutter</text>

  <!-- Tag: TypeScript -->
  <rect x="436" y="195" width="88" height="26" rx="13" fill="#3B82F6" opacity="0.1"/>
  <rect x="436" y="195" width="88" height="26" rx="13" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <text x="480" y="213" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#60A5FA">TypeScript</text>

  <!-- Tag: MySQL -->
  <rect x="534" y="195" width="68" height="26" rx="13" fill="#F59E0B" opacity="0.1"/>
  <rect x="534" y="195" width="68" height="26" rx="13" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
  <text x="568" y="213" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#FCD34D">MySQL</text>

  <!-- Tag: PHP -->
  <rect x="612" y="195" width="58" height="26" rx="13" fill="#8B5CF6" opacity="0.1"/>
  <rect x="612" y="195" width="58" height="26" rx="13" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.4"/>
  <text x="641" y="213" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#A78BFA">PHP</text>

  <!-- Location badge -->
  <text x="450" y="248" 
        text-anchor="middle" 
        font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif" 
        font-size="13" 
        fill="#6B7280">
    🇱🇰 Sri Lanka · Open to Work · Building Real-World Solutions
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="277" width="900" height="3" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- Glowing dots decoration -->
  <circle cx="58" cy="140" r="3" fill="#6366F1" opacity="0.6" filter="url(#glow)"/>
  <circle cx="842" cy="140" r="3" fill="#8B5CF6" opacity="0.6" filter="url(#glow)"/>
  <circle cx="450" cy="20" r="2" fill="#06B6D4" opacity="0.5"/>
</svg>
